name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint — ruff on Python, syntax check via py_compile
  # -----------------------------------------------------------------------
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        id: ruff
        run: |
          ruff check code/ 2>&1 | tee /tmp/ruff.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Python syntax check (py_compile)
        id: pycompile
        run: |
          find code/ -name '*.py' -print0 \
            | xargs -0 python -m py_compile 2>&1 | tee /tmp/pycompile.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        run: |
          echo "## Lint & Syntax Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          ruff_out=$(cat /tmp/ruff.txt)
          if [ -z "$ruff_out" ]; then
            echo "**Ruff:** All checks passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Ruff:** Found issues" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ruff.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          pyc_out=$(cat /tmp/pycompile.txt)
          if [ -z "$pyc_out" ]; then
            echo "**py_compile:** All files compile OK" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**py_compile:** Found errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/pycompile.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # -----------------------------------------------------------------------
  # 2. DB unit tests
  # -----------------------------------------------------------------------
  test-db:
    name: DB unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run DB tests
        env:
          PYTHONPATH: code
        run: python -m pytest tests/test_db.py -v 2>&1 | tee /tmp/db-tests.txt

      - name: Job summary
        if: always()
        run: |
          echo "## DB Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 /tmp/db-tests.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # 3. API endpoint tests
  # -----------------------------------------------------------------------
  test-api:
    name: API endpoint tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r tests/requirements-test.txt
          pip install pytest-asyncio

      - name: Run API tests
        env:
          PYTHONPATH: code
        run: python -m pytest tests/test_api.py -v 2>&1 | tee /tmp/api-tests.txt

      - name: Job summary
        if: always()
        run: |
          echo "## API Endpoint Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 /tmp/api-tests.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # 4. Frontend build check
  # -----------------------------------------------------------------------
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: code/admin/frontend/package-lock.json

      - name: Install & build frontend
        working-directory: code/admin/frontend
        run: |
          npm ci
          npm run build 2>&1 | tee /tmp/frontend-build.txt

      - name: Job summary
        if: always()
        run: |
          echo "## Frontend Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -15 /tmp/frontend-build.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
