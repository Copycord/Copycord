name: Docker build smoke test

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build for (linux/amd64, linux/arm64, or both)"
        required: false
        default: "linux/amd64"

permissions:
  contents: read

jobs:
  build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./code/Dockerfile
          platforms: ${{ github.event.inputs.platform || 'linux/amd64' }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Job summary
        if: always()
        run: |
          echo "## Docker Build Smoke Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platform** | \`${{ github.event.inputs.platform || 'linux/amd64' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dockerfile** | \`code/Dockerfile\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Result** | ${{ steps.build.outcome == 'success' && 'Build succeeded' || 'Build failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
