name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint — ruff on Python, syntax check via py_compile
  # -----------------------------------------------------------------------
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check code/

      - name: Python syntax check (py_compile)
        run: |
          find code/ -name '*.py' -print0 \
            | xargs -0 python -m py_compile

  # -----------------------------------------------------------------------
  # 2. DB unit tests
  # -----------------------------------------------------------------------
  test-db:
    name: DB unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run DB tests
        env:
          PYTHONPATH: code
        run: pytest tests/test_db.py -v

  # -----------------------------------------------------------------------
  # 3. API endpoint tests
  # -----------------------------------------------------------------------
  test-api:
    name: API endpoint tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r tests/requirements-test.txt
          pip install pytest-asyncio

      - name: Run API tests
        env:
          PYTHONPATH: code
        run: pytest tests/test_api.py -v

  # -----------------------------------------------------------------------
  # 4. Frontend build check
  # -----------------------------------------------------------------------
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: code/admin/frontend/package-lock.json

      - name: Install & build frontend
        working-directory: code/admin/frontend
        run: |
          npm ci
          npm run build
